<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Application | Leon County RP</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>


<nav class="navbar">

    <h1>Leon County RP</h1>

    <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../pages/applications.html">Applications</a>
        <a href="../pages/departments.html">Departments</a>
    </div>

</nav>



<section class="application-container">

    <h2>🚑 EMS Application</h2>

    <p>
        Apply to become a medical responder and help protect the citizens of Leon County.
    </p>


    <form>


        <label>Discord Username</label>
        <input type="text" placeholder="Example: User#0001">


        <label>Age</label>
        <input type="number" placeholder="Your Age">


        <label>Timezone</label>
        <input type="text" placeholder="EST, CST, PST, etc.">


        <label>
            Previous EMS or Medical Roleplay Experience
        </label>

        <textarea placeholder="Describe your experience"></textarea>



        <label>
            Why do you want to join EMS?
        </label>

        <textarea placeholder="Your answer"></textarea>



        <label>
            What does patient care mean to you?
        </label>

        <textarea placeholder="Your answer"></textarea>



        <label>
            How would you handle arriving at a major emergency scene?
        </label>

        <textarea placeholder="Your answer"></textarea>



        <label>
            Explain why communication is important for EMS.
        </label>

        <textarea placeholder="Your answer"></textarea>



        <label>
            How would you work with Law Enforcement and Fire Department personnel?
        </label>

        <textarea placeholder="Your answer"></textarea>



        <label>
            Why should you be accepted into Leon County EMS?
        </label>

        <textarea placeholder="Your answer"></textarea>



        <button type="submit">
            Submit Application
        </button>


    </form>


</section>



<footer>
    <p>© 2026 Leon County Roleplay | FiveM Community</p>
</footer>


</body>
</html>
