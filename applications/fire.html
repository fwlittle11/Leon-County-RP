<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Department Application | Leon County RP</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>


<nav class="navbar">

    <h1>Leon County RP</h1>

    <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../pages/applications.html">Applications</a>
        <a href="../pages/departments.html">Departments</a>
    </div>

</nav>



<section class="application-container">

    <h2>🚒 Fire Department Application</h2>

    <p>
        Apply to join Leon County Fire Rescue and serve the community.
    </p>


    <form>


        <label>Discord Username</label>
        <input type="text" placeholder="Example: User#0001">


        <label>Age</label>
        <input type="number" placeholder="Your Age">


        <label>Timezone</label>
        <input type="text" placeholder="EST, CST, PST, etc.">


        <label>Previous Fire/EMS Experience</label>
        <textarea placeholder="Describe any previous experience"></textarea>


        <label>
            Why do you want to join the Fire Department?
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            What does teamwork mean in emergency services?
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            How would you handle a stressful emergency situation?
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            Explain the importance of communication during a call.
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            What makes a good firefighter or emergency responder?
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            Why should we accept you into Leon County Fire Rescue?
        </label>
        <textarea placeholder="Your answer"></textarea>


        <button type="submit">
            Submit Application
        </button>


    </form>


</section>



<footer>
    <p>© 2026 Leon County Roleplay | FiveM Community</p>
</footer>


</body>
</html>
