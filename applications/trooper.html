<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Trooper Application | Leon County RP</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>


<nav class="navbar">

    <h1>Leon County RP</h1>

    <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../pages/applications.html">Applications</a>
        <a href="../pages/departments.html">Departments</a>
    </div>

</nav>



<section class="application-container">

    <h2>🚓 State Trooper Application</h2>

    <p>
        Apply to join the Leon County State Troopers and patrol the highways.
    </p>


    <form>


        <label>Discord Username</label>
        <input type="text" placeholder="Example: User#0001">


        <label>Age</label>
        <input type="number" placeholder="Your Age">


        <label>Timezone</label>
        <input type="text" placeholder="EST, CST, PST, etc.">


        <label>FiveM Experience</label>
        <textarea placeholder="Describe your FiveM RP experience"></textarea>


        <label>
            Why do you want to become a State Trooper?
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            What does professionalism mean in law enforcement?
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            Explain how you would handle a high-speed pursuit.
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            Explain the importance of radio communication.
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            How would you enforce traffic laws while maintaining good community relations?
        </label>
        <textarea placeholder="Your answer"></textarea>


        <label>
            Why should you be accepted into the State Troopers?
        </label>
        <textarea placeholder="Your answer"></textarea>


        <button type="submit">
            Submit Application
        </button>


    </form>


</section>



<footer>
    <p>© 2026 Leon County Roleplay | FiveM Community</p>
</footer>


</body>
</html>
