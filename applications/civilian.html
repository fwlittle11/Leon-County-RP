<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilian Application | Leon County RP</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>


<nav class="navbar">

    <h1>Leon County RP</h1>

    <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../pages/applications.html">Applications</a>
        <a href="../pages/departments.html">Departments</a>
    </div>

</nav>



<section class="application-container">

    <h2>🏙️ Civilian Application</h2>

    <p>
        Create your character and begin your story in Leon County.
    </p>


    <form>


        <label>Discord Username</label>
        <input type="text" placeholder="Example: User#0001">


        <label>Age</label>
        <input type="number" placeholder="Your Age">


        <label>Timezone</label>
        <input type="text" placeholder="EST, CST, PST, etc.">


        <label>
            Character Name
        </label>

        <input type="text" placeholder="First & Last Name">



        <label>
            Describe your character's background.
        </label>

        <textarea placeholder="Character history, goals, personality, etc."></textarea>



        <label>
            What type of civilian roleplay are you interested in?
        </label>

        <textarea placeholder="Business owner, jobs, activities, etc."></textarea>



        <label>
            Do you have any previous FiveM roleplay experience?
        </label>

        <textarea placeholder="Your answer"></textarea>



        <label>
            Explain RDM and VDM.
        </label>

        <textarea placeholder="Your answer"></textarea>



        <label>
            How will you contribute to the Leon County community?
        </label>

        <textarea placeholder="Your answer"></textarea>



        <label>
            Why should your civilian application be accepted?
        </label>

        <textarea placeholder="Your answer"></textarea>



        <button type="submit">
            Submit Application
        </button>


    </form>


</section>



<footer>
    <p>© 2026 Leon County Roleplay | FiveM Community</p>
</footer>


</body>
</html>
