<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Application | Leon County RP</title>
    <link rel="stylesheet" href="../style.css">
</head>


<body>


<nav class="navbar">

    <h1>Leon County RP</h1>

    <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../pages/applications.html">Applications</a>
        <a href="../pages/departments.html">Departments</a>
    </div>

</nav>



<section class="application-container">

    <h2>👮 Police Department Application</h2>

    <p>
        Fill out the application below. Make sure all information is accurate.
    </p>


    <form>


        <label>Discord Username</label>
        <input type="text" placeholder="Example: User#0001">


        <label>Age</label>
        <input type="number" placeholder="Your Age">


        <label>Timezone</label>
        <input type="text" placeholder="EST, CST, PST, etc.">


        <label>FiveM Experience</label>
        <textarea placeholder="Describe your FiveM RP experience"></textarea>


        <label>Why do you want to join the Police Department?</label>
        <textarea placeholder="Your answer"></textarea>


        <label>What does Serious Roleplay mean to you?</label>
        <textarea placeholder="Your answer"></textarea>


        <label>Explain RDM and VDM</label>
        <textarea placeholder="Your answer"></textarea>


        <label>Why should we accept you into this department?</label>
        <textarea placeholder="Your answer"></textarea>


        <button type="submit">
            Submit Application
        </button>


    </form>


</section>



<footer>
    <p>© 2026 Leon County Roleplay | FiveM Community</p>
</footer>


</body>
</html>
